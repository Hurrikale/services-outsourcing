<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>聊天应用</title>
  <link rel="stylesheet" href="../static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <!-- 引入依赖 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.1/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/1.2.7/marked.min.js"></script>
  
  <!-- 新增：PDF导出依赖库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>
</head>


<body>
  <div class="container">
    <!-- 左侧历史聊天记录栏 -->
    <div class="history-container">
      <h3>聊天记录</h3>
      <button onclick="startNewChat()"><font size="3">+</font>新建聊天</button>
      <div id="chatRecords">
        <ul id="chatList"></ul>
      </div>
      
      <!-- 用户设置区域 - 移动到历史记录下方 -->
      <div class="user-settings-area">
        <button id="userSettingsButton">用户设置</button>
        <!-- 弹窗 -->
        <div id="settingsModal" class="modal">
          <div class="modal-content">
            <span id="closeButton" class="close">&times;</span>
            <h2>用户设置</h2>
            <button id="toggleTheme">切换主题模式</button>
            <button id="logoutButton">注销账号</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 右侧聊天界面 -->
    <div class="chat-container">
      <div class="navbar">
        <!-- 移除原导航栏中的用户设置按钮 -->
      </div>
      
      <!-- 聊天消息显示区域 -->
      <div id="chatWindow" class="chat-window">
        <div class="welcome-message">
          <h3>欢迎使用数学问答助手</h3>
          <p>请提出您的数学问题，我将尽力为您解答</p>
        </div>
      </div>

      <div class="chat-input-container">
        <input type="text" id="chatInput" placeholder="输入消息" onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
        <div id="thinkingIndicator" style="display:none;">
          <span>思考中...</span>
        </div>
      </div>
    </div>
  </div>
  
  <script src="../static/script.js"></script>
  <script>
    // 初始化PDF导出功能（建议在script.js中实现完整逻辑）
    document.addEventListener('DOMContentLoaded', function() {
      // 监听AI消息容器的变化，动态添加导出按钮
      const chatWindow = document.getElementById('chatWindow');
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.type === 'childList') {
            // 遍历新增的AI消息，添加导出按钮
            Array.from(mutation.addedNodes).forEach(node => {
              if (node.classList && node.classList.contains('ai-message')) {
                addExportButtonToMessage(node);
              }
            });
          }
        });
      });
      
      // 开始观察聊天窗口的子节点变化
      observer.observe(chatWindow, { childList: true, subtree: true });
    });
    
    // 为AI消息添加导出按钮
    function addExportButtonToMessage(messageElement) {
      const actionsContainer = document.createElement('div');
      actionsContainer.className = 'message-actions';
      
      const exportButton = document.createElement('button');
      exportButton.className = 'export-pdf-btn';
      exportButton.textContent = '导出为PDF';
      exportButton.onclick = function() {
        exportMessageToPDF(messageElement);
      };
      
      actionsContainer.appendChild(exportButton);
      messageElement.appendChild(actionsContainer);
    }
    
    // 导出消息为PDF的函数（简化版，完整逻辑建议放在单独JS文件中）
    function exportMessageToPDF(messageElement) {
      if (!window.jspdf || !window.html2canvas) {
        alert('导出功能需要加载依赖库，请确保网络连接正常。');
        return;
      }
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      
      html2canvas(messageElement, {
        scale: 2,
        useCORS: true
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const imgWidth = 210;
        const imgHeight = canvas.height * imgWidth / canvas.width;
        
        doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        doc.save(`math-answer-${timestamp}.pdf`);
      }).catch(error => {
        console.error('导出失败:', error);
        alert('导出PDF时发生错误，请重试。');
      });
    }
  </script>
</body>

</html>
